# xLedgRSv2Beta validator mainnet config
#
# Safe template for validator-mode deployments. Replace the commented
# validation seed and any bind addresses for your own infrastructure.

[server]
port_rpc
port_peer
port_ws

[port_rpc]
ip = 127.0.0.1
port = 5005
protocol = http

[port_peer]
ip = 0.0.0.0
port = 51235
protocol = peer

[port_ws]
ip = 127.0.0.1
port = 6006
protocol = ws

[peers_max]
30

[ips]
r.ripple.com 51235
sahyadri.isrdc.in 51235
hubs.xrpkuwait.com 51235
hub.xrpl-commons.org 51235
s1.ripple.com 51235
s2.ripple.com 51235

[network_id]
main

[ledger_history]
full

[fetch_depth]
full

[node_db]
type = redb
path = ./xLedgRSv2Beta-validator-data

[validators_file]
./validators.txt

# [validation_seed]
# s████REPLACE_WITH_VALIDATOR_SEED

[xLedgRSv2Beta]
# Keep disabled until a real validator identity and publisher-backed UNL are
# configured. Set to 1 only after [validation_seed], [validation_secret_key], or
# [validator_token] is active and validators.txt contains trusted list data.
enable_consensus_close_loop = 0
