# xLedgRS mainnet node config
#
# Safe mainnet template for follower and observer deployments.

[server]
port_rpc
port_peer
port_ws

[port_rpc]
ip = 0.0.0.0
port = 5057
protocol = http

[port_peer]
ip = 0.0.0.0
port = 51236
protocol = peer

[port_ws]
ip = 127.0.0.1
port = 16006
protocol = ws

[peers_max]
100

[ips]
r.ripple.com 51235
sahyadri.isrdc.in 51235
hubs.xrpkuwait.com 51235
hub.xrpl-commons.org 51235
s1.ripple.com 51235
s2.ripple.com 51235

[ips_fixed]
# Optional: add trusted full-history peers in "host port" format.
# peer.example.com 51235

[network_id]
main

[ledger_history]
full

[fetch_depth]
full

[node_db]
type = redb
path = ./xledgrs-data

[validators_file]
./validators.txt

[xledgrs]
enable_consensus_close_loop = 1
post_sync_checkpoint_script = ./post-sync-checkpoint.sh
# Optional bootstrap helper:
# rpc_sync = 127.0.0.1:5005
