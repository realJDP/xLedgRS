# xLedgRS purpose: Show a complete example xLedgRSv2Beta config.
# xLedgRSv2Beta example config
#
# Safe public template: no validator seed, no machine-specific IPs, and no
# hardcoded private peers. Copy this file and tailor it to your deployment.

[server]
port_rpc
port_peer
port_ws

[port_rpc]
ip = 127.0.0.1
port = 5055
protocol = http

[port_peer]
ip = 0.0.0.0
port = 51235
protocol = peer

[port_ws]
ip = 127.0.0.1
port = 6006
protocol = ws

[peers_max]
100

[ips]
r.ripple.com 51235
s1.ripple.com 51235
s2.ripple.com 51235

[ips_fixed]
# Optional: add trusted peers in "host port" format.
# peer.example.com 51235

[network_id]
main

[ledger_history]
full

[fetch_depth]
full

[node_db]
type = redb
path = ./xLedgRSv2Beta-data

[validators_file]
./validators.txt

[xLedgRSv2Beta]
enable_consensus_close_loop = 0
post_sync_checkpoint_script = ./post-sync-checkpoint.sh
# Optional bootstrap helper:
# rpc_sync = 127.0.0.1:5005
