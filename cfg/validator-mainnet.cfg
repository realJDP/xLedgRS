# xLedgRS validator mainnet config
#
# Safe template for validator-mode deployments. Replace the commented
# validation seed and any bind addresses for your own infrastructure.
#
# TEMPORARY TEST-ONLY NOTE:
# This beta copy carries live validator identity/settings for local operator
# testing. Remove the seed and machine-specific endpoints before release.

[server]
port_rpc
port_peer
port_ws

[port_rpc]
ip = 0.0.0.0
port = 5057
protocol = http

[port_peer]
ip = 0.0.0.0
port = 51238
protocol = peer

[port_ws]
ip = 127.0.0.1
port = 16008
protocol = ws

[peers_max]
100

[ips]
r.ripple.com 51235
sahyadri.isrdc.in 51235
hubs.xrpkuwait.com 51235
hub.xrpl-commons.org 51235
s1.ripple.com 51235
s2.ripple.com 51235

[network_id]
main

[ledger_history]
full

[fetch_depth]
full

[node_db]
type = redb
path = ./xledgrs-validator-data

[validators_file]
./validators.txt

# [validation_seed]
# s████REPLACE_WITH_VALIDATOR_SEED

[xledgrs]
enable_consensus_close_loop = 1
