# xLedgRSv2Beta validator testnet config
#
# Safe template for testnet validator-mode deployments.

[server]
port_rpc
port_peer
port_ws

[port_rpc]
ip = 127.0.0.1
port = 5005
protocol = http

[port_peer]
ip = 0.0.0.0
port = 51235
protocol = peer

[port_ws]
ip = 127.0.0.1
port = 6006
protocol = ws

[peers_max]
30

[ips]
r.altnet.rippletest.net 51235

[network_id]
testnet

[ledger_history]
full

[fetch_depth]
full

[node_db]
type = redb
path = ./xLedgRSv2Beta-validator-data

[validators_file]
./validators.txt

# [validation_seed]
# s████REPLACE_WITH_VALIDATOR_SEED

[xLedgRSv2Beta]
# Keep disabled until a real validator identity and publisher-backed UNL are
# configured. Set to 1 only after [validation_seed], [validation_secret_key], or
# [validator_token] is active and validators.txt contains trusted list data.
enable_consensus_close_loop = 0
